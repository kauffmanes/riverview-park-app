# fly.toml app configuration file generated for riverview-park-app on 2026-02-25T12:16:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'riverview-park-app'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 5173
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
